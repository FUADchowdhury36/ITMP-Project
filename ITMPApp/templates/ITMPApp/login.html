<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>ITMP Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            background: #f3f6fa;
            color: #111827;
            display: flex;
            justify-content: center;
        }

        .page {
            width: 100%;
            max-width: 1440px;
            padding-top: 143px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .brand {
            text-align: center;
            margin-bottom: 42px;
        }

        .brand h1 {
            font-size: 44px;
            line-height: 1;
            font-weight: 800;
            color: #2f66e8;
            margin-bottom: 22px;
        }

        .brand p {
            font-size: 16px;
            font-weight: 700;
            color: #6b7280;
        }

        .login-card {
            width: 462px;
            min-height: 591px;
            background: #ffffff;
            border-radius: 14px;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
            padding: 49px 50px 30px;
        }

        .card-header {
            text-align: center;
            margin-bottom: 42px;
        }

        .card-header h2 {
            font-size: 28px;
            line-height: 1.2;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .card-header p {
            font-size: 16px;
            color: #6b7280;
        }

        .form-group {
            margin-bottom: 31px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 9px;
        }

        label {
            font-size: 14px;
            font-weight: 500;
            color: #374151;
        }

        .forgot-link,
        .register-link {
            font-size: 14px;
            color: #0b5cff;
            text-decoration: none;
            font-weight: 400;
        }

        input {
            width: 100%;
            height: 49px;
            border: 1px solid #6b7280;
            border-radius: 8px;
            padding: 0 16px;
            font-size: 15px;
            color: #111827;
            outline: none;
        }

        input::placeholder {
            color: #9ca3af;
        }

        input:focus {
            border-color: #2f66e8;
            box-shadow: 0 0 0 3px rgba(47, 102, 232, 0.15);
        }

        .button-group {
            margin-top: 49px;
            display: flex;
            flex-direction: column;
            gap: 35px;
        }

        .btn {
            width: 100%;
            height: 49px;
            border: none;
            border-radius: 7px;
            background: #2f66e8;
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        .footer-text {
            margin-top: 35px;
            text-align: center;
            font-size: 14px;
            color: #000000;
        }

        @media (max-width: 560px) {
            .page {
                padding: 80px 20px 40px;
            }

            .login-card {
                width: 100%;
                padding: 40px 28px 30px;
            }

            .brand h1 {
                font-size: 38px;
            }

            .card-header h2 {
                font-size: 25px;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="brand">
            <h1>ITMP</h1>
            <p>Intelligent Talent Matching Platform</p>
        </section>
        <section class="login-card">
            <div class="card-header">
                <h2>Welcome Back</h2>
                <p>Sign in to continue your job search journey</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <p style="color:red; text-align:center;">{{ message }}</p>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input id="email" name="email" type="email" placeholder="Enter your email" required/>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" placeholder="Enter your Password" required/>
                </div>
                <div class="button-group">
                    <button class="btn" type="submit" name="role" value="candidate">Sign In as Candidate</button>
                    <button class="btn" type="submit" name="role" value="employer">Sign In as Employer</button>
                </div>
                <p class="footer-text">
                    Don't have an account?
                    <a href="{% url 'register' %}">Register</a>
                </p>
            </form>
        </section>
    </main>
</body>
</html>
