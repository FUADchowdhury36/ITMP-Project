<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>ITMP Register</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            color: #111827;
            background: #ffffff;
        }

        header {
            height: 80px;
            background: #d9d9d9;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 160px;
        }

        .logo {
            font-size: 26px;
            font-weight: 800;
            color: #000;
        }

        nav {
            display: flex;
            gap: 160px;
        }

        nav a {
            text-decoration: none;
            color: #000;
            font-size: 16px;
            font-weight: 700;
        }

        nav a.active {
            color: #2563eb;
        }

        main {
            min-height: calc(100vh - 80px);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 92px;
        }

        .register-card {
            width: 480px;
            min-height: 760px;
            border: 1px solid #d1d5db;
            border-radius: 14px;
            background: #ffffff;
            box-shadow: 0 3px 5px rgba(0, 0, 0, 0.25);
            padding: 54px 48px 26px;
        }

        .card-inner {
            width: 100%;
            max-width: 380px;
            margin: 0 auto;
        }

        .card-header {
            margin-bottom: 50px;
        }

        .card-header h1 {
            font-size: 29px;
            line-height: 1.2;
            font-weight: 800;
            margin-bottom: 29px;
            text-align: center;
            color: #000;
        }

        .card-header p {
            width: 260px;
            margin: 0 auto;
            font-size: 14px;
            line-height: 1.2;
            font-weight: 700;
            color: #6b7280;
            text-align: left;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label,
        .role-title {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #111827;
        }

        input {
            width: 100%;
            height: 49px;
            border: 1px solid #cfd5dd;
            border-radius: 7px;
            padding: 0 14px;
            font-size: 15px;
            color: #111827;
            box-shadow: 2px 4px 4px rgba(0, 0, 0, 0.22);
            outline: none;
        }

        input::placeholder {
            color: #9ca3af;
        }

        input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.16);
        }

        .role-group {
            margin-top: 4px;
            margin-bottom: 18px;
        }

        .role-buttons {
            display: flex;
            justify-content: space-between;
            gap: 40px;
        }

        .role-btn {
            width: 140px;
            height: 40px;
            border-radius: 7px;
            border: 1px solid #cfd5dd;
            background: #ffffff;
            color: #111827;
            font-size: 16px;
            cursor: pointer;
        }

        .role-btn.active {
            background: #2f66e8;
            border-color: #2f66e8;
            color: #ffffff;
        }

        .submit-btn {
            width: 100%;
            height: 49px;
            border: none;
            border-radius: 7px;
            background: #2f66e8;
            color: #ffffff;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 1px;
        }

        .footer-text {
            margin-top: 22px;
            text-align: center;
            font-size: 14px;
            color: #6b7280;
        }

        .footer-text a {
            color: #0b5cff;
            text-decoration: none;
            margin-left: 5px;
        }

        @media (max-width: 700px) {
            header {
                padding: 0 28px;
            }

            nav {
                gap: 34px;
            }

            main {
                padding: 48px 20px;
            }

            .register-card {
                width: 100%;
                min-height: auto;
                padding: 42px 28px 28px;
            }

            .card-inner {
                max-width: 100%;
            }

            .role-buttons {
                gap: 16px;
            }

            .role-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">ITMP</div>
        <nav>
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}" class="active">Register</a>
        </nav>
    </header>
    <main>
        <section class="register-card">
            <div class="card-inner">
                <div class="card-header">
                    <h1>Create an Account</h1>
                    <p>Register as a candidate or employer to get started.</p>
                </div>

                {% if messages %}
                    {% for message in messages %}
                        <p style="color:red; text-align:center;">{{ message }}</p>
                    {% endfor %}
                {% endif %}

                <form method="POST">
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="fullname">Full Name</label>
                        <input id="fullname" name="fullname" type="text" placeholder="Enter your full name" required/>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input id="email" name="email" type="email" placeholder="Enter your email" required/>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input id="password" name="password" type="password" placeholder="Enter your password" required/>
                    </div>
                    <div class="form-group">
                        <label for="confirm-password">Confirm Password</label>
                        <input id="confirm-password" name="confirm_password" type="password" placeholder="Confirm your password" required/>
                    </div>
                    <div class="role-group">
                        <span class="role-title">Select Role</span>
                        <div class="role-buttons">
                            <button class="role-btn active" type="submit" name="role" value="candidate">Candidate</button>
                            <button class="role-btn" type="submit" name="role" value="employer">Employer</button>
                        </div>
                    </div>
                    <p class="footer-text">
                        Already have an account?
                        <a href="{% url 'login' %}">Login</a>
                    </p>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
